# Reusable workflow for publishing DocC to GitHub Pages.
# Each package's .github/workflows/docs.yml looks like:
#
#   name: Publish docs
#   on:
#     push:
#       tags: ['v*']
#     workflow_dispatch:
#   jobs:
#     publish:
#       uses: bare-swift/bare-swift/.github/workflows/publish-docs.yml@main
#       permissions:
#         pages: write
#         id-token: write
#         contents: read
#
# Requires the consuming package to declare swift-docc-plugin in Package.swift.
name: publish-docs

on:
  workflow_call:

jobs:
  build-and-deploy:
    runs-on: macos-15
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build DocC archive
        run: |
          TARGET=$(swift package describe --type json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('products',[{}])[0].get('targets',[d.get('targets',[{}])[0].get('name','')])[0] if d.get('products') else d['targets'][0]['name'])")
          echo "Target: $TARGET"
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target "$TARGET" \
            --transform-for-static-hosting \
            --hosting-base-path "$(basename $GITHUB_REPOSITORY)" \
            --output-path ./docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - id: deployment
        uses: actions/deploy-pages@v4
