# Reusable workflow for publishing DocC to GitHub Pages.
# Each package's .github/workflows/docs.yml looks like:
#
#   name: Publish docs
#   on:
#     push:
#       tags: ['v*']
#     workflow_dispatch:
#   jobs:
#     publish:
#       uses: bare-swift/bare-swift/.github/workflows/publish-docs.yml@main
#       with:
#         target: Greet      # the Swift module name to document
#       permissions:
#         pages: write
#         id-token: write
#         contents: read
#
# Requires the consuming package to declare swift-docc-plugin in Package.swift.
name: publish-docs

on:
  workflow_call:
    inputs:
      target:
        description: "Swift module name to generate DocC for"
        required: true
        type: string

jobs:
  build-and-deploy:
    runs-on: macos-15
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve dependencies
        run: swift package resolve
      - name: Build DocC archive
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target "${{ inputs.target }}" \
            --transform-for-static-hosting \
            --hosting-base-path "$(basename $GITHUB_REPOSITORY)" \
            --output-path ./docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - id: deployment
        uses: actions/deploy-pages@v4
