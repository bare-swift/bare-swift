# Reusable workflow for cutting a GitHub Release on a semver tag.
# Each package's .github/workflows/release.yml looks like:
#
#   name: Release
#   on:
#     push:
#       tags: ['v*.*.*']
#   jobs:
#     release:
#       uses: bare-swift/bare-swift/.github/workflows/release.yml@main
#       permissions:
#         contents: write
#
name: release

on:
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify CHANGELOG entry exists for this tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          if ! grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::No CHANGELOG entry for ${VERSION}"
            exit 1
          fi
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk -v v="${VERSION}" '
            $0 ~ "^## \\["v"\\]" { capture=1; next }
            capture && /^## \[/ { capture=0 }
            capture { print }
          ' CHANGELOG.md > /tmp/release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
